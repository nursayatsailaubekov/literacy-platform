name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: CI Pipeline
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: literacy_user
          POSTGRES_PASSWORD: literacy_pass
          POSTGRES_DB: literacy_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install email-validator pytest flake8  # Устанавливаем явно
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run linter (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests with pytest
        env:
          DATABASE_URL: postgresql://literacy_user:literacy_pass@localhost:5432/literacy_db
          SECRET_KEY: test-secret-key
        run: |
          pytest