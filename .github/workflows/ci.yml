name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: CI Pipeline  # Это имя появится в настройках GitHub
    runs-on: ubuntu-latest

    services:
      # Если твои тесты требуют PostgreSQL, его можно добавить сюда
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: literacy_user
          POSTGRES_PASSWORD: literacy_pass
          POSTGRES_DB: literacy_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/checkout@v3
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest flake8

      - name: Run linter (flake8)
        run: |
          # Остановит сборку, если есть ошибки синтаксиса
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests with pytest
        env:
          DATABASE_URL: postgresql://literacy_user:literacy_pass@localhost:5432/literacy_db
          SECRET_KEY: test-secret-key
        run: |
          pytest